# Cau hinh rieng cho deploy tren Render / instance RAM nho

# Giam khoi tao repository trong luc boot; repository se duoc tao khi co request dau tien.
spring.data.jpa.repositories.bootstrap-mode=lazy

# Pool DB nho hon de giam footprint tren instance nho.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}

# Giam so thread mac dinh cua Tomcat va executor de tiet kiem stack memory.
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:24}
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS:2}
spring.task.execution.pool.core-size=${ASYNC_CORE_THREADS:2}
spring.task.execution.pool.max-size=${ASYNC_MAX_THREADS:4}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:50}

# Tren moi truong deploy, mac dinh chi log muc INFO.
logging.level.com.university=${APP_LOG_LEVEL:INFO}
logging.level.ums=${APP_LOG_LEVEL:INFO}

# Khong seed permissions trong luc deploy neu khong bat ro bang env.
app.permissions.bootstrap-enabled=${PERMISSIONS_BOOTSTRAP_ENABLED:false}
