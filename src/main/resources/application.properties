# SERVER
server.address=0.0.0.0
server.port=${PORT:10000}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:uploads}

# CAU hinh loading (nếu cần)
# JPA / Hibernate
spring.main.lazy-initialization=true
spring.jpa.show-sql=${SQL_SHOW:false}
spring.jpa.properties.hibernate.format_sql=${SQL_FORMAT:false}
spring.jpa.hibernate.ddl-auto=${FUNCTION}
spring.jpa.open-in-view=false

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# Fetch/batch
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=50

# Chỉ định Package quét Entity
spring.data.jpa.repositories.bootstrap-mode=deferred

# Exception
# Bắt DispatcherServlet ném NoHandlerFoundException cho URL không khớp handler
spring.mvc.throw-exception-if-no-handler-found=true
# Tắt mapping static resource mặc định (nếu app thuần REST API, không cần serve static files)
spring.web.resources.add-mappings=false

# DATABASE: PostgreSQL Supabase/NeonDB | ?sslmode=require
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



# LOGGING — Tối ưu, sạch, không spam
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=error
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
logging.level.org.springframework.transaction=warn
logging.level.org.springframework.orm.jpa=warn
# Giữ lại log debug cho code của bạn
logging.level.root=INFO
logging.level.com.university.repository=WARN
logging.level.com.university=${APP_LOG_LEVEL:DEBUG}
logging.level.ums=${APP_LOG_LEVEL:DEBUG}


# Tùy chọn: ghi log ra file (để xem rõ hơn)
logging.exception-conversion-word=%replace(%wEx){'\n','␤'}%nopex
logging.file.name=logs/ums.log
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

# Chatbot
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL}


# SendGrid Key (legacy — không còn dùng, giữ để tránh lỗi nếu env var vẫn được set)
sendgrid.api.key=${SENDGRID_API_KEY:unused}

# SMTP Mail (Gmail hoặc bất kỳ SMTP provider)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email gửi đi (thường trùng với MAIL_USERNAME nếu dùng Gmail)
app.mail.from=${MAIL_USERNAME}
app.mail.from-name=${MAIL_FROM_NAME:He thong}
# Link frontend để người dùng bấm reset password
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:}
# Link frontend để người dùng xem/ thanh toán hóa đơn học phí
app.frontend.invoice-url=${FRONTEND_INVOICE_URL:}


# Thiết lập thời gian timeout cho session (mặc định là 10 phút)
server.servlet.session.timeout=10m


# Ép Jackson (JSON) trả về giờ VN khi làm việc với React
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# 4. Giảm bớt các thông tin dư thừa của DevTools
spring.devtools.add-properties=false



# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Bật ProblemDetail (RFC 7807) - khuyến nghị dùng
spring.mvc.problemdetails.enabled=true

# Error response chi tiết
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-path=always
server.error.whitelabel.enabled=false

# Path error controller (mặc định)
server.error.path=/error

# Cho phép gộp các câu lệnh insert
spring.jpa.properties.hibernate.order_inserts=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.username=default
spring.data.redis.ssl.enabled=false

# Tắt hoàn toàn việc tự động cấu hình Redis Repositories
spring.data.redis.repositories.enabled=false

# Timeout - tăng cho Redis Cloud (US-East latency)
spring.data.redis.timeout=15000ms
spring.data.redis.connect-timeout=10000ms

# Lettuce connection pool (phải enable rõ ràng)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=3
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-idle=2
spring.data.redis.lettuce.pool.max-wait=10000ms
spring.data.redis.lettuce.shutdown-timeout=200ms

# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# logging.level.org.hibernate=DEBUG
# logging.level.org.hibernate.boot=DEBUG


# FILE - Supabase Storage S3 protocol
supabase.storage.endpoint=${S3_DATABASE_URL}
supabase.storage.region=${REGION}
supabase.storage.bucket=${S3_BUCKET}
supabase.storage.access-key=${ACCESS_KEY}
supabase.storage.secret-key=${SECRET_KEY}
supabase.storage.path-prefix=${S3_PATH_PREFIX:documents}

# Permissions auto-assign: true = tu dong gan quyen vao role, false = chi tao permissions moi
app.permissions.bootstrap-enabled=${PERMISSIONS_BOOTSTRAP_ENABLED:true}
app.permissions.auto-assign=${PERMISSIONS_AUTO_ASSIGN:true}

# Phuong thuc thanh toan hoc phi (code=mo_ta, phan cach bang dau phay - khong dung dau phay trong mo_ta)
student.payment.methods=VI_DIEN_TU=Vi dien tu (MoMo/ZaloPay/VNPay),CHUYEN_KHOAN=Chuyen khoan ngan hang,THE_NOI_DIA=The noi dia ATM (phi 3000 VND),THE_QUOC_TE=The quoc te Visa/Mastercard (phi 5000 VND)
